<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(0, 55)">
    <rect width="800" height="800" fill="#1a0808"/>

    <!-- 4x4 routing matrix — crosspoint grid with active connections -->

    <!-- Grid lines -->
    <g stroke="#ee4444" stroke-width="3.5" opacity="0.25">
      <!-- Horizontal -->
      <line x1="180" y1="200" x2="620" y2="200"/>
      <line x1="180" y1="310" x2="620" y2="310"/>
      <line x1="180" y1="420" x2="620" y2="420"/>
      <line x1="180" y1="530" x2="620" y2="530"/>
      <!-- Vertical -->
      <line x1="235" y1="145" x2="235" y2="585"/>
      <line x1="345" y1="145" x2="345" y2="585"/>
      <line x1="455" y1="145" x2="455" y2="585"/>
      <line x1="565" y1="145" x2="565" y2="585"/>
    </g>

    <!-- Inactive crosspoints (dim circles at every intersection) -->
    <g fill="none" stroke="#ee4444" stroke-width="1.5" opacity="0.3">
      <circle cx="235" cy="200" r="12"/>
      <circle cx="345" cy="200" r="12"/>
      <circle cx="455" cy="200" r="12"/>
      <circle cx="565" cy="200" r="12"/>
      <circle cx="235" cy="310" r="12"/>
      <circle cx="345" cy="310" r="12"/>
      <circle cx="455" cy="310" r="12"/>
      <circle cx="565" cy="310" r="12"/>
      <circle cx="235" cy="420" r="12"/>
      <circle cx="345" cy="420" r="12"/>
      <circle cx="455" cy="420" r="12"/>
      <circle cx="565" cy="420" r="12"/>
      <circle cx="235" cy="530" r="12"/>
      <circle cx="345" cy="530" r="12"/>
      <circle cx="455" cy="530" r="12"/>
      <circle cx="565" cy="530" r="12"/>
    </g>

    <!-- Active crosspoints (bright, diagonal routing pattern) -->
    <circle cx="235" cy="200" r="18" fill="none" stroke="#ee4444" stroke-width="5"/>
    <circle cx="345" cy="310" r="18" fill="none" stroke="#ee4444" stroke-width="5"/>
    <circle cx="455" cy="420" r="18" fill="none" stroke="#ee4444" stroke-width="5"/>
    <circle cx="565" cy="530" r="18" fill="none" stroke="#ee4444" stroke-width="5"/>

    <!-- Center dots on active crosspoints -->
    <circle cx="235" cy="200" r="6" fill="#ee4444"/>
    <circle cx="345" cy="310" r="6" fill="#ee4444"/>
    <circle cx="455" cy="420" r="6" fill="#ee4444"/>
    <circle cx="565" cy="530" r="6" fill="#ee4444"/>

    <!-- Secondary routing (off-diagonal) -->
    <circle cx="455" cy="310" r="14" fill="none" stroke="#ee4444" stroke-width="3" opacity="0.6"/>
    <circle cx="455" cy="310" r="4" fill="#ee4444" opacity="0.6"/>

    <circle cx="235" cy="530" r="14" fill="none" stroke="#ee4444" stroke-width="3" opacity="0.6"/>
    <circle cx="235" cy="530" r="4" fill="#ee4444" opacity="0.6"/>

    <!-- Signal flow arrows -->
    <line x1="148" y1="310" x2="172" y2="310" stroke="#ee4444" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <polygon points="176,310 166,305 166,315" fill="#ee4444" opacity="0.4"/>

    <line x1="400" y1="572" x2="400" y2="596" stroke="#ee4444" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <polygon points="400,600 395,590 405,590" fill="#ee4444" opacity="0.4"/>

    <!-- Product name -->

    <!-- Descriptor -->

  </g>
</svg>
